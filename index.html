<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>MesRestos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf6f0;
    --bg2: #f2ebe0;
    --card: #fffcf8;
    --ink: #1e1712;
    --ink2: #5a4e44;
    --ink3: #9a8e84;
    --accent: #c85d3a;
    --accent2: #e07a55;
    --gold: #c9963a;
    --gold2: #e8b85a;
    --green: #4a7c59;
    --red: #c84040;
    --border: #e5dcd0;
    --shadow: rgba(30,23,18,0.08);
    --shadow2: rgba(30,23,18,0.18);
    --radius: 16px;
    --radius-sm: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    max-height: 100%;
    overflow: hidden;
    position: fixed;
    width: 100%;
    max-width: 100vw;
    left: 0;
    right: 0;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); overflow-x: hidden; }
  
  /* Empêche tout élément de dépasser la largeur de l'écran */
  .drawer, .app-header, .bottom-nav, .main {
    max-width: 100vw;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 12px) 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .app-logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
  .app-logo span { color: var(--accent); }
  .lang-toggle { display: flex; gap: 2px; background: var(--bg2); border-radius: 20px; padding: 3px; }
  .lang-btn { padding: 4px 10px; border-radius: 16px; border: none; background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600; color: var(--ink3); transition: all 0.2s; }
  .lang-btn.active { background: var(--accent); color: #fff; }

  .main {
    padding-top: calc(var(--safe-top) + 68px);
    padding-bottom: calc(var(--safe-bottom) + 80px);
    height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── SEARCH ── */
  .search-bar { padding: 14px 16px 10px; position: relative; }
  .search-input { width: 100%; padding: 12px 16px 12px 42px; border: 1.5px solid var(--border); border-radius: 50px; background: var(--card); font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--ink); outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 30px; top: 50%; transform: translateY(-50%); font-size: 1rem; color: var(--ink3); pointer-events: none; }

  /* ── FILTERS ── */
  .filter-row { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); font-size: 0.8rem; font-weight: 500; color: var(--ink2); cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .section-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; color: var(--ink2); padding: 4px 16px 8px; letter-spacing: 0.01em; }

  /* ── CARDS ── */
  .restaurant-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
  .resto-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 2px 8px var(--shadow); overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .resto-card:active { transform: scale(0.98); box-shadow: 0 1px 4px var(--shadow); }
  .card-header { display: flex; align-items: flex-start; gap: 12px; padding: 14px 14px 10px; }
  .card-emoji { width: 48px; height: 48px; border-radius: 12px; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
  .card-meta { flex: 1; min-width: 0; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-type { font-size: 0.8rem; color: var(--ink3); margin-top: 2px; }
  .card-badges { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .badge { padding: 3px 8px; border-radius: 8px; font-size: 0.72rem; font-weight: 600; }
  .badge-price { background: #f0f7f0; color: var(--green); }
  .badge-menu { background: #fff3ed; color: var(--accent); }
  .card-days { display: flex; gap: 4px; padding: 0 14px 12px; }
  .day-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; }
  .day-dot.open { background: var(--accent); color: #fff; }
  .day-dot.closed { background: var(--bg2); color: var(--ink3); }

  /* ── EMPTY ── */
  .empty-state { text-align: center; padding: 60px 30px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .empty-icon { font-size: 3.5rem; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--ink2); }
  .empty-sub { font-size: 0.88rem; color: var(--ink3); line-height: 1.5; }

  /* ── BOTTOM NAV ── */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: var(--card); border-top: 1px solid var(--border); padding: 10px 20px calc(var(--safe-bottom) + 10px); display: flex; justify-content: space-around; align-items: center; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: transparent; cursor: pointer; color: var(--ink3); transition: color 0.2s; padding: 4px 16px; border-radius: var(--radius-sm); }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.fav-active { color: var(--gold); }
  .nav-btn.fav-active svg { fill: var(--gold); stroke: var(--gold); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-label { font-size: 0.68rem; font-weight: 600; }
  .nav-add-btn { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(200,93,58,0.4); font-size: 1.6rem; transition: transform 0.15s; margin-top: -20px; }
  .nav-add-btn:active { transform: scale(0.94); }

  /* ── OVERLAY ── */
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0); transition: background 0.3s; pointer-events: none; }
  .modal-overlay.open { background: rgba(30,23,18,0.5); pointer-events: all; }

  /* ── DRAWER ── */
  .drawer { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; max-width: 100vw; z-index: 201; background: var(--card); border-radius: 24px 24px 0 0; box-shadow: 0 -8px 32px var(--shadow2); transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1); max-height: 92dvh; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
  .drawer *, .drawer *::before, .drawer *::after { box-sizing: border-box; }
  .drawer-body, .drawer-header { max-width: 100%; overflow-x: hidden; }
  .drawer.open { transform: translateY(0); }
  .drawer-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 12px auto 0; }
  .drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--border); }
  .drawer-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; }
  .btn-close { width: 32px; height: 32px; border-radius: 50%; background: var(--bg2); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--ink2); }
  .drawer-body { overflow-y: auto; overflow-x: hidden; padding: 16px 20px; flex: 1; padding-bottom: calc(var(--safe-bottom) + 100px); }
  .drawer-body::-webkit-scrollbar { width: 3px; }
  .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── FORM ── */
  .form-section { margin-bottom: 20px; }
  .form-section-title { font-size: 0.72rem; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .form-group { margin-bottom: 12px; }
  .form-label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--ink2); margin-bottom: 5px; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 16px; color: var(--ink); outline: none; transition: border-color 0.2s; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); background: var(--card); }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  .price-selector { display: flex; gap: 6px; }
  .price-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-size: 0.9rem; cursor: pointer; transition: all 0.2s; text-align: center; font-weight: 600; color: var(--ink3); }
  .price-btn.active { background: var(--gold2); border-color: var(--gold); color: var(--ink); }

  .day-selector { display: flex; gap: 6px; }
  .day-toggle { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
  .day-toggle input { display: none; }
  .day-toggle-dot { width: 36px; height: 36px; border-radius: 50%; background: var(--bg2); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: var(--ink3); transition: all 0.2s; text-transform: uppercase; }
  .day-toggle input:checked ~ .day-toggle-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
  .day-label-text { font-size: 0.6rem; color: var(--ink3); }

  .dish-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .dish-item { display: flex; align-items: center; gap: 8px; background: var(--bg); border-radius: var(--radius-sm); padding: 8px 12px; border: 1px solid var(--border); }
  .dish-name { flex: 1; font-size: 0.88rem; color: var(--ink); }
  .dish-remove { width: 24px; height: 24px; border-radius: 50%; background: #fee; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: var(--red); }
  .add-dish-row { display: flex; gap: 8px; }
  .add-dish-row .form-input { flex: 1; }
  .btn-add-dish { padding: 11px 14px; border-radius: var(--radius-sm); background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 0.88rem; font-weight: 600; white-space: nowrap; }

  /* ── CAMERA ZONE ── */
  .camera-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; background: var(--bg); transition: border-color 0.2s; position: relative; overflow: hidden; }
  .camera-zone:active { border-color: var(--accent); background: var(--bg2); }
  .camera-zone img { max-width: 100%; max-height: 160px; border-radius: var(--radius-sm); object-fit: contain; display: block; margin: 0 auto; }
  .camera-placeholder { color: var(--ink3); }
  .camera-icon { font-size: 2rem; display: block; margin-bottom: 6px; }
  .camera-text { font-size: 0.85rem; }
  .camera-actions { display: flex; gap: 8px; margin-top: 10px; }
  .cam-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--card); font-size: 0.82rem; font-weight: 600; cursor: pointer; color: var(--ink2); }
  .cam-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  #cardInputFallback { display: none; }

  /* ── LOCATION ── */
  .location-row { display: flex; gap: 8px; align-items: flex-end; }
  .location-row .form-group { flex: 1; }
  .btn-locate { padding: 11px 16px; border-radius: var(--radius-sm); background: var(--green); color: #fff; border: none; cursor: pointer; font-size: 1rem; font-weight: 600; white-space: nowrap; }

  .btn-geocode { width: 100%; padding: 12px; border-radius: var(--radius-sm); background: var(--ink); color: #fff; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity 0.2s; }
  .btn-geocode:active { opacity: 0.8; }
  .btn-geocode:disabled { opacity: 0.5; }
  .field-error { border-color: var(--red) !important; }
  .field-error-msg { font-size: 0.75rem; color: var(--red); margin-top: 3px; }

  /* ── Vue carte ── */
  .map-view {
    position: fixed;
    top: calc(var(--safe-top) + 60px);
    left: 0; right: 0;
    bottom: calc(var(--safe-bottom) + 64px);
    z-index: 10;
  }
  #leafletMap { width: 100%; height: 100%; }

  /* Popup Leaflet custom */
  .leaflet-popup-content-wrapper {
    border-radius: 14px !important;
    box-shadow: 0 6px 24px rgba(30,23,18,0.18) !important;
    padding: 0 !important;
    overflow: hidden;
    border: none !important;
  }
  .leaflet-popup-content { margin: 0 !important; width: auto !important; }
  .leaflet-popup-tip-container { display: none; }
  .map-popup { padding: 14px 16px; min-width: 180px; background: #fffcf8; cursor: pointer; }
  .map-popup-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: #1e1712; margin-bottom: 2px; }
  .map-popup-type { font-size: 0.78rem; color: #9a8e84; margin-bottom: 6px; }
  .map-popup-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .map-popup-chip { font-size: 0.75rem; background: #f2ebe0; border-radius: 20px; padding: 3px 9px; color: #5a4e44; }
  .map-popup-chip.accent { background: #c85d3a; color: #fff; }
  .map-no-coords { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: #fffcf8; border-radius: 20px; padding: 8px 16px; font-size: 0.8rem; color: #9a8e84; box-shadow: 0 2px 12px rgba(30,23,18,0.12); z-index: 500; white-space: nowrap; pointer-events: none; }

  .btn-submit { width: 100%; padding: 16px; border-radius: var(--radius); background: var(--accent); color: #fff; border: none; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
  .btn-submit:active { opacity: 0.85; }
  .btn-delete { width: 100%; padding: 13px; border-radius: var(--radius); background: transparent; color: var(--red); border: 1.5px solid #fcc; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 8px; }

  /* ── DETAIL ── */
  .detail-section { margin-bottom: 20px; }
  .detail-section-title { font-size: 0.72rem; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .detail-name { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--ink); line-height: 1.2; margin-bottom: 6px; }
  .detail-type { font-size: 0.9rem; color: var(--ink2); margin-bottom: 12px; }
  .detail-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .detail-chip { padding: 6px 12px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 0.82rem; font-weight: 500; color: var(--ink2); text-decoration: none; display: inline-block; }
  .days-grid { display: flex; gap: 6px; }
  .day-info { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .day-info .dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
  .day-info .dot.open { background: var(--accent); color: #fff; }
  .day-info .dot.closed { background: var(--bg2); color: var(--ink3); }
  .day-info .day-label { font-size: 0.6rem; color: var(--ink3); }
  .dish-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--bg2); border-radius: 20px; padding: 6px 12px; font-size: 0.85rem; color: var(--ink2); margin: 0 4px 6px 0; }
  .map-btns { display: flex; gap: 8px; }
  .map-btn { flex: 1; padding: 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--card); font-size: 0.85rem; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; color: var(--ink); display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
  .card-preview { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
  .card-preview img { width: 100%; object-fit: contain; display: block; }
  .notes-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.88rem; color: var(--ink2); line-height: 1.5; border: 1px solid var(--border); }
  .edit-btn { width: 100%; padding: 14px; border-radius: var(--radius); background: var(--ink); color: #fff; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; }

  /* ── STARS ── */
  .star-row { display: flex; gap: 4px; }
  .star { font-size: 1.3rem; cursor: pointer; transition: transform 0.1s; filter: grayscale(1); opacity: 0.4; }
  .star.on { filter: none; opacity: 1; }
  .star:active { transform: scale(1.3); }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: 500; z-index: 300; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── LOADER ── */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ── SETTINGS ── */
  .settings-section { margin-bottom: 24px; }
  .settings-section-title { font-size: 0.72rem; font-weight: 700; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; padding: 0 4px; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: background 0.15s; }
  .settings-row:active { background: var(--bg2); }
  .settings-row-left { display: flex; align-items: center; gap: 12px; }
  .settings-row-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  .settings-row-icon.green { background: #e8f5ee; }
  .settings-row-icon.blue  { background: #e8f0ff; }
  .settings-row-icon.orange{ background: #fff3ed; }
  .settings-row-icon.red   { background: #fee; }
  .settings-row-text { display: flex; flex-direction: column; }
  .settings-row-label { font-size: 0.9rem; font-weight: 600; color: var(--ink); }
  .settings-row-sub   { font-size: 0.76rem; color: var(--ink3); margin-top: 1px; }
  .settings-row-arrow { color: var(--ink3); font-size: 0.8rem; }
  .settings-row.danger .settings-row-label { color: var(--red); }
  .settings-row.danger .settings-row-icon { background: #fee; }

  /* À propos */
  .about-logo { text-align: center; padding: 24px 0 16px; }
  .about-logo-text { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--ink); }
  .about-logo-text span { color: var(--accent); }
  .about-version { font-size: 0.8rem; color: var(--ink3); margin-top: 4px; }
  .about-desc { font-size: 0.88rem; color: var(--ink2); line-height: 1.6; text-align: center; padding: 0 8px 20px; }
  .about-divider { height: 1px; background: var(--border); margin: 8px 0 20px; }
  .about-credit { text-align: center; font-size: 0.8rem; color: var(--ink3); padding-bottom: 8px; }

  /* Import confirm zone */
  .import-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px; text-align: center; cursor: pointer; background: var(--bg); transition: border-color 0.2s; margin-bottom: 12px; }
  .import-zone:active { border-color: var(--accent); }
  .import-zone-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
  .import-zone-text { font-size: 0.85rem; color: var(--ink3); }

  /* Badge compteur */
  .stat-badge { background: var(--accent); color: #fff; border-radius: 20px; padding: 2px 8px; font-size: 0.72rem; font-weight: 700; }

// ══════════════════════════════════════════════════
//  CAPACITOR PLUGIN BRIDGE
//  Détecte si on est sur natif ou navigateur web
// ══════════════════════════════════════════════════
const isNative = () => window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();

function getPlugin(name) {
  if (isNative() && window.Capacitor?.Plugins?.[name]) {
    return window.Capacitor.Plugins[name];
  }
  return null;
}

// ── GEOLOCATION ──
async function getCurrentPosition() {
  const Geo = getPlugin('Geolocation');
  if (!Geo) {
    return new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(
        p => resolve({ coords: p.coords }),
        reject,
        { enableHighAccuracy: true }
      );
    });
  }
  return await Geo.getCurrentPosition({ enableHighAccuracy: true });
}

// ── PREFERENCES (localStorage fallback) ──
async function prefSet(key, value) {
  const Pref = getPlugin('Preferences');
  if (!Pref) { localStorage.setItem(key, value); return; }
  await Pref.set({ key, value });
}
async function prefGet(key) {
  const Pref = getPlugin('Preferences');
  if (!Pref) { return { value: localStorage.getItem(key) }; }
  return await Pref.get({ key });
}

// ── HAPTICS ──
function hapticLight() {
  const Hap = getPlugin('Haptics');
  if (Hap) Hap.impact({ style: 'LIGHT' }).catch(()=>{});
}

//  OUVRIR DANS MAP
// ══════════════════════════════════════════════════
function openInMaps(app, r) {
  hapticLight();
  const lat = r.lat, lng = r.lng, name = encodeURIComponent(r.name);
  const addr = encodeURIComponent(r.address || r.name);
  let url;
  if (app === 'google') {
    url = (lat && lng)
      ? `https://www.google.com/maps?q=${lat},${lng}`
      : `https://www.google.com/maps/search/${addr}`;
  } else {
    url = (lat && lng)
      ? `maps://maps.apple.com/?ll=${lat},${lng}&q=${name}`
      : `maps://maps.apple.com/?q=${addr}`;
  }
  window.open(url, '_blank');
}

async function loadData() {
  const res = await prefGet('mesrestos');
  const flag = await prefGet('mesrestos_nosamples');
  if (res?.value) {
    restaurants = JSON.parse(res.value);
    // Migration 1 : marquer les exemples par leur ID
    restaurants = restaurants.map(r => {
      if (['s1','s2','s3'].includes(r.id) && !r.isSample) r.isSample = true;
      return r;
    });
    // Migration 2 : adresse structurée
    restaurants = restaurants.map(r => {
      if (r.address && !r.street) {
        const parts = r.address.split(',').map(s => s.trim());
        r.street     = parts[0] || '';
        const cityPart = parts[1] || '';
        const postalMatch = cityPart.match(/^(\d{4,5})\s+(.*)$/);
        if (postalMatch) { r.postalCode = postalMatch[1]; r.city = postalMatch[2]; }
        else { r.city = cityPart; r.postalCode = ''; }
        r.country = parts[2] || 'France';
      }
      return r;
    });
    await saveData();
  } else if (!flag?.value) {
    // Premier lancement seulement — pas de flag "exemples supprimés"
    restaurants = SAMPLE;
    await saveData();
  }
  renderFilters();
  renderList();
}

async function saveData() {
  await prefSet('mesrestos', JSON.stringify(restaurants));
}

function renderFilters() {
  const types = ['all', ...new Set(restaurants.map(r => r.type).filter(Boolean))];
  document.getElementById('filterRow').innerHTML = types.map(tp => {
    const label = tp === 'all' ? t('filterAll') : tp;
    return `<div class="filter-chip ${activeFilter===tp?'active':''}" onclick="setFilter('${tp}')">${label}</div>`;
  }).join('');

  // Ligne source — visible seulement si des restos importés existent
  const hasImported = restaurants.some(r => r.imported);
  const sourceRowEl = document.getElementById('sourceRow');
  if (hasImported) {
    sourceRowEl.style.display = 'flex';
    sourceRowEl.innerHTML = [
      `<div class="filter-chip ${sourceFilter==='all'?'active':''}" onclick="setSourceFilter('all')">👥 ${t('filterAll')}</div>`,
      `<div class="filter-chip ${sourceFilter==='mine'?'active':''}" onclick="setSourceFilter('mine')">👤 ${t('filterMine')}</div>`,
      `<div class="filter-chip ${sourceFilter==='friends'?'active':''}" onclick="setSourceFilter('friends')">👥 ${t('filterFriends')}</div>`,
    ].join('');
  } else {
    sourceRowEl.style.display = 'none';
    if (sourceFilter !== 'all') sourceFilter = 'all';
  }
}

function setFilter(f) { activeFilter = f; hapticLight(); renderFilters(); renderList(); }
function setSourceFilter(f) { sourceFilter = f; hapticLight(); renderFilters(); renderList(); }

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.getElementById('sectionTitle').textContent = favOnly ? t('sectionFavs') : t('sectionTitle');
  let list = restaurants.filter(r => {
    const matchQ = !q || r.name?.toLowerCase().includes(q) || r.type?.toLowerCase().includes(q) || r.address?.toLowerCase().includes(q);
    const matchF = activeFilter === 'all' || r.type === activeFilter;
    const matchFav = !favOnly || (r.rating >= 4);
    const matchSrc = sourceFilter === 'all' || (sourceFilter === 'mine' ? !r.imported : r.imported);
    return matchQ && matchF && matchFav && matchSrc;
  });

  // Trier les favoris par note décroissante
  if (favOnly) list = list.sort((a, b) => (b.rating || 0) - (a.rating || 0));

  const el = document.getElementById('restaurantList');
  if (restaurants.length === 0) {
    el.innerHTML = `<div class="empty-state fade-in"><div class="empty-icon">🍽️</div><div class="empty-title">${t('emptyTitle')}</div><div class="empty-sub">${t('emptySub')}</div></div>`;
    return;
  }
  if (list.length === 0) {
    const icon  = favOnly ? '⭐' : '🔍';
    const title = favOnly ? t('noFavs') : t('noResults');
    const sub   = favOnly ? t('noFavsSub') : t('noResultsSub');
    el.innerHTML = `<div class="empty-state fade-in"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
    return;
  }

  const days = t('days');
  const dayKeys = ['mon','tue','wed','thu','fri','sat','sun'];
  el.innerHTML = list.map(r => {
    const hasMenu = dayKeys.some(d => r.menuDays?.[d]);
    const priceMap = {'1':t('price1'),'2':t('price2'),'3':t('price3'),'4':t('price4')};
    const stars = r.rating ? '⭐'.repeat(r.rating) : '';
    return `<div class="resto-card fade-in" onclick="openDetail('${r.id}')">
      <div class="card-header">
        <div class="card-emoji">${getEmoji(r.type)}</div>
        <div class="card-meta">
          <div class="card-name">${r.name}</div>
          <div class="card-type">${r.type||''}${stars?' · '+stars:''}</div>
          <div class="card-badges">
            ${r.price?`<span class="badge badge-price">${priceMap[r.price]||r.price}</span>`:''}
            ${hasMenu?`<span class="badge badge-menu">🗒 ${t('hasmenu')}</span>`:''}
            ${r.imported?`<span class="badge" style="background:#e8f4fd;color:#2980b9">👥</span>`:''}
          </div>
        </div>
      </div>
      <div class="card-days">
        ${days.map((d,i)=>`<div class="day-dot ${r.menuDays?.[dayKeys[i]]?'open':'closed'}">${d[0]}</div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

        [lang==='fr'?'Note':'Rating']:                   r.rating ? '⭐'.repeat(r.rating) : '',
        [lang==='fr'?'Téléphone':'Phone']:               r.phone || '',
        [lang==='fr'?'Email':'Email']:                   r.email || '',
        [lang==='fr'?'Site web':'Website']:              r.website || '',
        [lang==='fr'?'Rue':'Street']:                    r.street || '',
        [lang==='fr'?'Ville':'City']:                    r.city || '',
        [lang==='fr'?'Code postal':'Postal code']:       r.postalCode || '',
        [lang==='fr'?'Pays':'Country']:                  r.country || '',
        [lang==='fr'?'Adresse':'Address']:               r.address || '',
        [lang==='fr'?'Latitude':'Latitude']:             r.lat || '',
        [lang==='fr'?'Longitude':'Longitude']:           r.lng || '',
        [lang==='fr'?'Jours avec menu':'Menu days']:     menuJours,
        [lang==='fr'?'Plats préférés':'Favorite dishes']:(r.dishes||[]).join(' / '),
        [lang==='fr'?'Notes':'Notes']:                   r.notes || '',
        [lang==='fr'?'Source':'Source']:                 'ami',
      };
    });

    const ws = XLSX.utils.json_to_sheet(rows);
    const colWidths = Object.keys(rows[0]||{}).map(k => ({
      wch: Math.max(k.length, ...rows.map(r => String(r[k]||'').length), 12)
    }));
    ws['!cols'] = colWidths;
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'MesRestos');
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'base64' });

    if (Filesystem && Share) {
      await Filesystem.writeFile({ path: filename, data: wbout, directory: 'CACHE', encoding: null });
      const { uri } = await Filesystem.getUri({ path: filename, directory: 'CACHE' });
      await Share.share({
        title: `MesRestos — ${list.length} restaurant${list.length>1?'s':''}`,
        files: [uri],
        dialogTitle: lang==='fr'?'Partager la sélection':'Share selection',
      });
    } else {
      XLSX.writeFile(wb, filename);
    }
  } catch(e) {
    console.error('Share XLS error:', e);
    showToast(t('exportError'));
  }
}

// ── Camera ──
function getCameraPlugin() {
  // Capacitor 6 : plugins disponibles sur window.Capacitor.Plugins
  if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Camera) {
    return window.Capacitor.Plugins.Camera;
  }
  return null;
}

async function captureCard() {
  const Camera = getCameraPlugin();
  if (!Camera) {
    // Fallback navigateur : forcer caméra
    const inp = document.getElementById('cardInputFallback');
    inp.setAttribute('capture', 'environment');
    inp.value = '';
    inp.click();
    return;
  }
  try {
    const image = await Camera.getPhoto({
      quality: 85,
      allowEditing: false,
      resultType: 'dataUrl',   // CameraResultType.DataUrl
      source: 'CAMERA',        // CameraSource.Camera
      saveToGallery: false,
    });
    if (image && image.dataUrl) setCardImage(image.dataUrl);
  } catch(e) {
    // Annulation utilisateur — silencieux
    const msg = e?.message || '';
    if (!msg.includes('cancel') && !msg.includes('Cancel') && !msg.includes('No image')) {
      showToast('Erreur caméra : ' + msg);
    }
  }
}

async function chooseFromLibrary() {
  const Camera = getCameraPlugin();
  if (!Camera) {
    // Fallback navigateur : choisir depuis fichier
    const inp = document.getElementById('cardInputFallback');
    inp.removeAttribute('capture');
    inp.value = '';
    inp.click();
    return;
  }
  try {
    const image = await Camera.getPhoto({
      quality: 85,
      allowEditing: false,
      resultType: 'dataUrl',   // CameraResultType.DataUrl
      source: 'PHOTOS',        // CameraSource.Photos
    });
    if (image && image.dataUrl) setCardImage(image.dataUrl);
  } catch(e) {
    const msg = e?.message || '';
    if (!msg.includes('cancel') && !msg.includes('Cancel') && !msg.includes('No image')) {
      showToast('Erreur bibliothèque : ' + msg);
    }
  }
}

function removeCard() {
  currentCard = null;
  const preview = document.getElementById('cardPreview');
  if (preview) preview.innerHTML = `<div class="camera-placeholder"><span class="camera-icon">📷</span><span class="camera-text">${t('scanCard')}</span></div>`;
  const btnRm = document.getElementById('btnRemoveCard');
  if (btnRm) btnRm.remove();
}

function setCardImage(dataUrl) {
  currentCard = dataUrl;
  const preview = document.getElementById('cardPreview');
  if (preview) preview.innerHTML = `<img src="${dataUrl}" alt="carte de visite" style="max-width:100%;border-radius:8px">`;
  // Ajouter bouton supprimer si absent
  const actions = document.querySelector('.camera-actions');
  if (actions && !document.getElementById('btnRemoveCard')) {
    const btn = document.createElement('button');
    btn.id = 'btnRemoveCard'; btn.type = 'button'; btn.className = 'cam-btn'; btn.textContent = '🗑';
    btn.addEventListener('click', e => { e.stopPropagation(); removeCard(); });
    actions.appendChild(btn);
  }
}

function handleCardFallback(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => setCardImage(ev.target.result);
  reader.readAsDataURL(file);
}

// ── Géocodage Nominatim (adresse → coordonnées) ──
async function geocodeAddress() {
  const street  = document.getElementById('fStreet')?.value.trim();
  const city    = document.getElementById('fCity')?.value.trim();
  const postal  = document.getElementById('fPostal')?.value.trim();
  const country = document.getElementById('fCountry')?.value.trim();

  // Validation champs obligatoires
  let hasError = false;
  [['fStreet', t('street')], ['fCity', t('city')], ['fPostal', t('postalCode')], ['fCountry', t('country')]].forEach(([id, label]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('field-error');
    const next = el.nextElementSibling;
    if (next?.classList.contains('field-error-msg')) next.remove();
    if (!el.value.trim()) {
      el.classList.add('field-error');
      const msg = document.createElement('div');
      msg.className = 'field-error-msg';
      msg.textContent = t('reqField')(label.replace(' *',''));
      el.after(msg);
      hasError = true;
    }
  });
  if (hasError) return;

  const btn = document.getElementById('btnGeocode');
  const orig = btn.textContent;
  btn.textContent = t('geocoding');
  btn.disabled = true;

  try {
    const query = encodeURIComponent(`${street}, ${postal} ${city}, ${country}`);
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${query}&accept-language=${lang}`;
    const res = await fetch(url, {
      headers: { 'User-Agent': 'MesRestos/1.0' }
    });
    const data = await res.json();

    if (data && data.length > 0) {
      const lat = parseFloat(data[0].lat).toFixed(6);
      const lng = parseFloat(data[0].lon).toFixed(6);
      document.getElementById('fLat').value = lat;
      document.getElementById('fLng').value = lng;

      // Afficher le résultat
      const coordsResult  = document.getElementById('coordsResult');
      const coordsDisplay = document.getElementById('coordsDisplay');
      coordsDisplay.textContent = `${parseFloat(lat).toFixed(4)}, ${parseFloat(lng).toFixed(4)}`;
      coordsResult.style.display = 'flex';

      hapticLight();
      showToast(t('geocodeOk'));
    } else {
      showToast(t('geocodeError'));
    }
  } catch(e) {
    console.error('Geocode error:', e);
    showToast(t('geocodeError'));
  }

  btn.textContent = orig;
  btn.disabled = false;
}

// ── Submit ──
async function submitForm() {
  const name = document.getElementById('fName').value.trim();
  if (!name) {
    document.getElementById('fName').focus();
    document.getElementById('fName').classList.add('field-error');
    return;
  }

  // Champs adresse (non bloquants — obligatoires seulement pour le géocodage)
  const street  = document.getElementById('fStreet')?.value.trim() || '';
  const city    = document.getElementById('fCity')?.value.trim() || '';
  const postal  = document.getElementById('fPostal')?.value.trim() || '';
  const country = document.getElementById('fCountry')?.value.trim() || '';

  // Construire l'adresse complète
  const address = [street, postal && city ? `${postal} ${city}` : city, country].filter(Boolean).join(', ');

  const dayKeys = ['mon','tue','wed','thu','fri','sat','sun'];
  const menuDays = {};
  dayKeys.forEach(d => { menuDays[d] = document.getElementById('fDay_'+d)?.checked || false; });

  const data = {
    id: editingId || Date.now().toString(),
    name,
    type: document.getElementById('fType').value,
    price: selectedPrice,
    phone: (() => { const v = document.getElementById('fPhone').value.trim(); return v === '+33' ? '' : v; })(),
    email: document.getElementById('fEmail').value.trim(),
    website: (() => { const v = document.getElementById('fWebsite').value.trim(); return (v === 'www.' || v === 'http://www.') ? '' : v; })(),
    // Adresse structurée
    street, city, postalCode: postal, country,
    address,  // adresse complète pour l'affichage / Maps
    lat: document.getElementById('fLat').value,
    lng: document.getElementById('fLng').value,
    menuDays, dishes: [...currentDishes],
    businessCard: currentCard,
    notes: document.getElementById('fNotes').value.trim(),
    rating: selectedRating,
  };

  if (editingId) {
    const idx = restaurants.findIndex(x => x.id === editingId);
    restaurants[idx] = data;
  } else {
    restaurants.unshift(data);
  }
  await saveData();
  closeAll();
  renderList(); renderFilters();
  showToast(t('saved'));
}

async function deleteResto(id) {
  if (!confirm(t('confirmDelete'))) return;
  restaurants = restaurants.filter(x => x.id !== id);
  await saveData();
  closeAll();
  renderList(); renderFilters();
  showToast(t('deleted'));
}

  document.getElementById('mapView').style.display  = 'none';
  document.getElementById('navMap').classList.remove('active');
  renderList();
}

function switchTab(tab) {
  // Désactiver le mode favoris si on change d'onglet
  if (tab === 'map' && favOnly) {
    favOnly = false;
    document.getElementById('navFav').classList.remove('fav-active');
  }
  document.getElementById('navMap').classList.toggle('active', tab === 'map');
  document.getElementById('mainList').style.display  = tab === 'list' ? '' : 'none';
  document.getElementById('mapView').style.display   = tab === 'map'  ? '' : 'none';
  hapticLight();
  if (tab === 'map') renderMap();
}

function renderMap() {
  const withCoords = restaurants.filter(r => r.lat && r.lng);

  // Supprimer le badge "sans coords" s'il existe
  document.querySelector('.map-no-coords')?.remove();

  // Init Leaflet une seule fois
  if (!leafletMap) {
    leafletMap = L.map('leafletMap', { zoomControl: true, attributionControl: true });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(leafletMap);
  }

  // Supprimer anciens marqueurs
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];

  if (withCoords.length === 0) {
    // Centrer sur France par défaut
    leafletMap.setView([46.6, 2.3], 6);
    const badge = document.createElement('div');
    badge.className = 'map-no-coords';
    badge.textContent = lang === 'fr'
      ? 'Aucun restaurant géolocalisé pour l\'instant'
      : 'No geolocated restaurant yet';
    document.getElementById('mapView').appendChild(badge);
    return;
  }

  const priceMap = {'1':'€','2':'€€','3':'€€€','4':'€€€€'};
  const bounds = [];

  withCoords.forEach(r => {
    const lat = parseFloat(r.lat);
    const lng = parseFloat(r.lng);

    // Icône SVG custom couleur accent
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:36px;height:36px;border-radius:50% 50% 50% 0;
        background:var(--accent);transform:rotate(-45deg);
        box-shadow:0 2px 8px rgba(200,93,58,0.45);
        display:flex;align-items:center;justify-content:center;
        border:2px solid #fff;
      "><span style="transform:rotate(45deg);font-size:1rem;line-height:1">${getEmoji(r.type)}</span></div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 36],
      popupAnchor: [0, -38],
    });

    const stars = r.rating ? '⭐'.repeat(r.rating) : '';
    const popup = L.popup({ closeButton: false, maxWidth: 240 }).setContent(`
      <div class="map-popup" onclick="switchTab('list');setTimeout(()=>openDetail('${r.id}'),100)">
        <div class="map-popup-name">${r.name}</div>
        <div class="map-popup-type">${r.type || ''}${stars ? '  ' + stars : ''}</div>
        <div class="map-popup-chips">
          ${r.price ? `<span class="map-popup-chip accent">${priceMap[r.price]||''}</span>` : ''}
          ${r.city  ? `<span class="map-popup-chip">📍 ${r.city}</span>` : ''}
        </div>
      </div>`);

    const marker = L.marker([lat, lng], { icon }).addTo(leafletMap).bindPopup(popup);
    mapMarkers.push(marker);
    bounds.push([lat, lng]);
  });

  // Ajuster le zoom sur tous les marqueurs
  if (bounds.length === 1) {
    leafletMap.setView(bounds[0], 15);
  } else {
    leafletMap.fitBounds(bounds, { padding: [40, 40] });
  }

  // Forcer le recalcul de la taille (important après display:none → display:block)
  setTimeout(() => leafletMap.invalidateSize(), 80);
}

function shareHtmlFallback(html, filename) {
  // Navigateur : ouvrir dans un nouvel onglet + proposer de sauvegarder

  const url  = URL.createObjectURL(blob);
  window.open(url, '_blank');
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ── EXPORT XLSX ──
async function exportData() {
  hapticLight();
  const filename = `mesrestos_${new Date().toISOString().slice(0,10)}.xlsx`;
  const Filesystem = window.Capacitor?.Plugins?.Filesystem;
  const Share      = window.Capacitor?.Plugins?.Share;

  try {
    // ── Construire les données pour le tableau ──
    const dayKeys  = ['mon','tue','wed','thu','fri','sat','sun'];
    const dayNames = t('days'); // ['Lun','Mar',...]
    const priceMap = {'1':'€','2':'€€','3':'€€€','4':'€€€€'};

    const rows = restaurants.map(r => {
      const menuJours = dayKeys
        .filter(d => r.menuDays?.[d])
        .map((d,_,__,i=dayKeys.indexOf(d)) => dayNames[dayKeys.indexOf(d)])
        .join(', ');
      return {
        [lang==='fr'?'Nom':'Name']:                     r.name || '',
        [lang==='fr'?'Type de cuisine':'Cuisine type']:  r.type || '',
        [lang==='fr'?'Tarif':'Price']:                   priceMap[r.price] || '',
        [lang==='fr'?'Note':'Rating']:                   r.rating ? '⭐'.repeat(r.rating) : '',
        [lang==='fr'?'Téléphone':'Phone']:               r.phone || '',
        [lang==='fr'?'Email':'Email']:                   r.email || '',
        [lang==='fr'?'Site web':'Website']:              r.website || '',
        [lang==='fr'?'Rue':'Street']:                    r.street || '',
        [lang==='fr'?'Ville':'City']:                    r.city || '',
        [lang==='fr'?'Code postal':'Postal code']:       r.postalCode || '',
        [lang==='fr'?'Pays':'Country']:                  r.country || '',
        [lang==='fr'?'Adresse':'Address']:               r.address || '',
        [lang==='fr'?'Latitude':'Latitude']:             r.lat || '',
        [lang==='fr'?'Longitude':'Longitude']:           r.lng || '',
        [lang==='fr'?'Jours avec menu':'Menu days']:     menuJours,
        [lang==='fr'?'Plats préférés':'Favorite dishes']:(r.dishes||[]).join(' / '),
        [lang==='fr'?'Notes':'Notes']:                   r.notes || '',
        [lang==='fr'?'Source':'Source']:                 'ami',
      };
    });

    const ws = XLSX.utils.json_to_sheet(rows);

    // Largeurs colonnes auto
    const colWidths = Object.keys(rows[0]||{}).map(k => ({
      wch: Math.max(k.length, ...rows.map(r => String(r[k]||'').length), 12)
    }));
    ws['!cols'] = colWidths;

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, lang==='fr'?'Restaurants':'Restaurants');

    // ── Générer le binaire en base64 ──
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'base64' });

    if (Filesystem) {
      // Écrire sur iOS
      await Filesystem.writeFile({
        path: filename,
        data: wbout,
        directory: 'DOCUMENTS',
        encoding: null, // base64 binaire
      });

      if (Share) {
        const { uri } = await Filesystem.getUri({
          path: filename,
          directory: 'DOCUMENTS',
        });
        await Share.share({
          title: 'MesRestos — Export',
          files: [uri],
          dialogTitle: lang==='fr'?'Partager / Sauvegarder':'Share / Save',
        });
      } else {
        showToast(t('exportOk'));
      }
    } else {
      // Fallback navigateur
      XLSX.writeFile(wb, filename);
      showToast(t('exportOk'));
    }
  } catch(e) {
    console.error('Export XLSX error:', e);
    showToast(t('exportError'));
  }
}

// ── IMPORT ──
function handleImportFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const isXlsx = file.name.endsWith('.xlsx');
  const reader = new FileReader();

  reader.onload = async ev => {
    try {
      let data;
      if (isXlsx) {
        // Lire le XLSX et reconstruire les objets restaurants
        const wb = XLSX.read(ev.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws);
        // Mapping colonnes FR/EN → objet restaurant minimal
        data = rows.map((r, i) => {
          // Reconstruire menuDays depuis la colonne "Jours avec menu" / "Menu days"
          const menuStr = r['Jours avec menu'] || r['Menu days'] || '';
          const menuDays = {mon:false,tue:false,wed:false,thu:false,fri:false,sat:false,sun:false};
          if (menuStr) {
            const dayMapFR = {'lun':'mon','lundi':'mon','mar':'tue','mardi':'tue','mer':'wed','mercredi':'wed','jeu':'thu','jeudi':'thu','ven':'fri','vendredi':'fri','sam':'sat','samedi':'sat','dim':'sun','dimanche':'sun'};
            const dayMapEN = {'mon':'mon','monday':'mon','tue':'tue','tuesday':'tue','wed':'wed','wednesday':'wed','thu':'thu','thursday':'thu','fri':'fri','friday':'fri','sat':'sat','saturday':'sat','sun':'sun','sunday':'sun'};
            menuStr.split(/[,;\/]/).map(s => s.trim().toLowerCase()).forEach(s => {
              const key = dayMapFR[s] || dayMapEN[s];
              if (key) menuDays[key] = true;
            });
          }
          return {
            id: Date.now().toString() + i,
            name:      r['Nom'] || r['Name'] || '',
            type:      r['Type de cuisine'] || r['Cuisine type'] || '',
            price:     Object.entries({'€':'1','€€':'2','€€€':'3','€€€€':'4'}).find(([k])=>k===(r['Tarif']||r['Price']))?.[1] || '',
            rating:    (r['Note']||r['Rating']||'').length || 0,
            phone:     r['Téléphone'] || r['Phone'] || '',
            email:     r['Email'] || '',
            website:   r['Site web'] || r['Website'] || '',
            street:    r['Rue'] || r['Street'] || '',
            city:      r['Ville'] || r['City'] || '',
            postalCode:r['Code postal'] || r['Postal code'] || '',
            country:   r['Pays'] || r['Country'] || '',
            address:   r['Adresse'] || r['Address'] || '',
            lat:       r['Latitude'] || '',
            lng:       r['Longitude'] || '',
            notes:     r['Notes'] || '',
            dishes:    (r['Plats préférés'] || r['Favorite dishes'] || '').split(' / ').filter(Boolean),
            menuDays,
            businessCard: null,
            imported:  (r['Source'] || r['source'] || '').toLowerCase() !== 'moi',
          };
        });
      } else {
        data = JSON.parse(ev.target.result);
      }

      if (!Array.isArray(data)) throw new Error('invalid');

      // Fusionner en ignorant les doublons (même nom)
      const existingNames = new Set(restaurants.map(r => r.name?.toLowerCase().trim()));
      const newOnes = data.filter(r => r.name && !existingNames.has(r.name.toLowerCase().trim()));
      const skipped = data.length - newOnes.length;

      if (newOnes.length === 0) {
        showToast(lang==='fr' ? `Aucun nouveau restaurant (${skipped} déjà présent${skipped>1?'s':''})` : `No new restaurant (${skipped} already exist${skipped>1?'s':''})`);
        closeSettings();
        return;
      }

      // Le flag imported est déjà calculé depuis la colonne Source dans le mapping XLSX
      // Pour les JSON sans flag, on force imported:true
      const tagged = newOnes.map(r => ({ ...r, imported: r.imported !== false ? (r.imported ?? true) : false }));
      restaurants = [...restaurants, ...tagged];
      await saveData();
      renderList(); renderFilters();
      const msg = skipped > 0
        ? (lang==='fr' ? `✓ ${newOnes.length} importé${newOnes.length>1?'s':''}, ${skipped} doublon${skipped>1?'s':''} ignoré${skipped>1?'s':''}` : `✓ ${newOnes.length} imported, ${skipped} duplicate${skipped>1?'s':''} skipped`)
        : t('importOk');
      showToast(msg);
      closeSettings();
    } catch(err) {
      console.error(err);
      showToast(t('importError'));
    }
  };

  if (isXlsx) {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file);
  }
  e.target.value = '';
}

// ── RESET ──
async function resetData() {
  if (!confirm(t('confirmReset'))) return;
  hapticLight();
  restaurants = [];
  await saveData();
  renderList(); renderFilters();
  showToast(t('resetOk'));
  closeSettings();
}

async function removeSamples() {
  const sampleNames = ['Le Petit Bistrot', 'Sakura Tokyo', 'La Trattoria'];
  const toRemove = restaurants.filter(r =>
    r.isSample ||
    ['s1','s2','s3'].includes(r.id) ||
    sampleNames.includes(r.name)
  );
  if (toRemove.length === 0) {
    showToast(t('removeSamplesOk'));
    closeSettings();
    return;
  }
  if (!confirm(t('confirmRemoveSamples'))) return;
  hapticLight();
  const removeIds = new Set(toRemove.map(r => r.id));
  restaurants = restaurants.filter(r => !removeIds.has(r.id));
  await saveData();
  // Poser le flag pour ne plus jamais recharger les exemples
  await prefSet('mesrestos_nosamples', 'true');
  renderList(); renderFilters();
  showToast(t('removeSamplesOk'));
  closeSettings();
}

// ── ABOUT ──
function showAbout() {
  showToast(`MesRestos — ${t('aboutVersion')}`);
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
document.getElementById('searchInput').placeholder = t('searchPlaceholder');
loadData();

// ── Fix clavier iOS ──
document.addEventListener('focusin', e => {
  if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) {
    lockDrawerWidth();
    setTimeout(() => {
      lockDrawerWidth();
      e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 400);
  }
});

// Reset quand le clavier se ferme (blur)
document.addEventListener('focusout', () => {
  setTimeout(() => {
    if (!document.activeElement || !['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) {
      lockDrawerWidth();
    }
  }, 100);
});

// ── Verrou scroll iOS ──
// iOS peut laisser window.scrollY != 0 après caméra/clavier,
// ce qui décale tous les position:fixed. On force scrollY=0 en permanence.
window.addEventListener('scroll', () => {
  if (window.scrollY !== 0) window.scrollTo(0, 0);
}, { passive: true });

</script>
